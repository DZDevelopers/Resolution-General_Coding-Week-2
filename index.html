<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Aymen Super Duper Clicker Game</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body style="background-color:powderblue;">
        <p>Money: $<span id="click-count">0</span></p>

        <main class="game-layout">
            <aside class="stats-panel">
                <h2><center>Your Items</center></h2>
                <div id="stats-items">
                    <h4 id="empty-message">Nothing owned broke boy</h4>
                </div>
            </aside>
            <section class="game-area">
                <button id="click-button">
                    <img src="images/cookie.not_png.webp" alt="Cookie" width="200" />
                </button>
            </section>
            <aside class="shop-panel">
                <h2><center>Upgrades Shop</center></h2>
                <div id="shop-items">

                </div>
            </aside>
        </main>

        <script src="script.js" defer></script>
  </body>
</html>
